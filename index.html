<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 maximum-scale=1.0">
    <title>jcdchat; id: ??????</title>
    <style>
        html {
            height: 100%;
            background-color: #323348;
        }

        body {
            margin: 0;
            padding: 10px;
            height: calc(100% - 20px);
        }

        #main-messages-container {
            width: 100%;
            height: calc(100% - 30px);
            margin-bottom: 10px;
            overflow-y: scroll;
        }

        .message {
            width: 100%;
            display: flex;
        }

        .message-id {
            margin-right: 10px;
            flex-grow: 0;
            font-family: monospace;
            font-size: 14px;
            color: #d9b7d8;
            cursor: default;
        }

        .message-value {
            margin-right: 10px;
            flex-grow: 1;
            font-family: monospace;
            font-size: 14px;
            color: #fff;
            cursor: default;
        }

        #input {
            margin: 0;
            border: none;
            padding: 0;
            outline: none;
            width: 100%;
            height: 20px;
            cursor: default;
            font-family: monospace;
            font-size: 14px;
            background-color: #323348;
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="main-messages-container">
        <div id="messages-container">
            <div class="message">
                <div class="message-id">SYSTEM:</div>
                <div class="message-value">Welcome to jcdchat. <br><br> Anonymous. Amnesic. Instant. <br><br> - No
                    accounts. <br> - No names. <br> - No history. <br> - No setup. <br><br> The room remembers nothing.
                    Messages only exist while people are here to see them. <br><br> Start typing and press Enter.</div>
            </div>
        </div>
        <div id="messages-container-scroll-target"></div>
    </div>
    <input type="text" id="input">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getAuth,
            signInAnonymously,
            connectAuthEmulator,
            signOut,
            onAuthStateChanged,
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import {
            getDatabase,
            ref,
            get,
            set,
            update,
            remove,
            onValue,
            onDisconnect,
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBKLagVjAqJymEkLMKaJvfbep_TUPD9S0",
            authDomain: "project-7461927070501805311.firebaseapp.com",
            databaseURL: "https://project-7461927070501805311-default-rtdb.firebaseio.com",
            projectId: "project-7461927070501805311",
            storageBucket: "project-7461927070501805311.firebasestorage.app",
            messagingSenderId: "117048132520",
            appId: "1:117048132520:web:62f45feb23dede3aae939d"
        };

        initializeApp(firebaseConfig);

        const auth = getAuth();
        const database = getDatabase();

        let promptedCode = prompt("code: ");

        let userId, usersRef, userRef;
        let lastSnappedUsersData = {};
        let userData = {
            updateFlag: false,
            message: "",
        };

        let waitFlag = false;
        let sendMessageFlag = false;
        let lastTimeNoWait = null;
        let errorFlag = false;

        window.addEventListener('keydown', e => {
            if (!errorFlag) {
                document.querySelector("#input").focus();

                if (e.key == "Enter") {
                    e.preventDefault();

                    if (!sendMessageFlag && document.querySelector("#input").value != "") {
                        document.querySelector("#input").blur();

                        sendMessageFlag = true;
                        userData.message = document.querySelector("#input").value;

                        document.querySelector("#input").value = "";
                    }
                }
            }
        }, true);

        function run() {
            if (!errorFlag) {
                if (!waitFlag) {
                    if (auth.currentUser) {
                        if (sendMessageFlag) {
                            if (!lastSnappedUsersData[userId]) {
                                waitFlag = true;
                                set(userRef, userData).then(() => waitFlag = false);
                            } else {
                                waitFlag = true;
                                userData.updateFlag = !userData.updateFlag;
                                update(userRef, userData).then(() => {
                                    waitFlag = false;
                                    sendMessageFlag = false;
                                });
                            }
                        }
                    } else {
                        waitFlag = true;
                        signInAnonymously(auth).then(() => waitFlag = false);
                    }
                    lastTimeNoWait = Date.now();
                } else {
                    if (Date.now() - lastTimeNoWait > 5000) {
                        errorFlag = true;
                    }
                }
                requestAnimationFrame(run);
            } else {
                remove(userRef).catch(() => { }).then(() => {
                    alert("Error. Page will be disabled until reloaded.");
                });
            }
        }

        run();

        onAuthStateChanged(auth, user => {
            if (user) {
                userId = user.uid;
                usersRef = ref(database, "users");
                userRef = ref(database, "users/" + userId);

                document.title = "jcdchat; id: " + userId.substring(0, 6);

                get(ref(database, "code")).then((snapshot) => {
                    if (snapshot.val() != null && promptedCode != snapshot.val()) {
                        errorFlag = true;
                    }
                });

                onDisconnect(userRef).remove();

                onValue(usersRef, snapshot => {
                    let snappedUsersData = snapshot.val();

                    if (snappedUsersData) {
                        for (const [snappedUserId, snappedUserData] of Object.entries(snappedUsersData)) {
                            let lastSnappedUserData = lastSnappedUsersData[snappedUserId];

                            if (lastSnappedUserData != null && lastSnappedUserData.updateFlag != snappedUserData.updateFlag) {
                                let htmlMessage = document.createElement("div");
                                let htmlMessageId = document.createElement("div");
                                let htmlMessageValue = document.createElement("div");

                                htmlMessage.classList.add("message");
                                htmlMessageId.classList.add("message-id");
                                htmlMessageValue.classList.add("message-value");

                                htmlMessageId.innerText = snappedUserId.substring(0, 6) + ":";
                                htmlMessageValue.innerText = snappedUserData.message;

                                htmlMessage.appendChild(htmlMessageId);
                                htmlMessage.appendChild(htmlMessageValue);

                                document.querySelector("#messages-container").appendChild(htmlMessage);
                                
                                document.querySelector("#messages-container-scroll-target").scrollIntoView();
                            }
                        }
                        lastSnappedUsersData = snappedUsersData;
                    } else {
                        lastSnappedUsersData = {};
                    }
                });
            }
        });
    </script>
</body>

</html>
